name: Trigger Docs Update

on:
  push:
    branches:
      - main
    paths:
      - 'docs/**'

jobs:
  trigger-web-rebuild:
    name: Signal Web Repository
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch Event to Web Repo
        run: |
          # Requires an Organization Secret named NKZ_DOCS_DISPATCH_TOKEN
          # (A Personal Access Token with 'repo' scope)
          curl -L \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.NKZ_DOCS_DISPATCH_TOKEN }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/nkz-os/web/dispatches \
            -d '{"event_type": "update-docs", "client_payload": {"source_repo": "${{ github.repository }}"}}'