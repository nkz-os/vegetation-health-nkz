# =============================================================================
# Vegetation Prime Celery Beat Deployment
# =============================================================================
# Celery beat scheduler for periodic vegetation subscription processing
# =============================================================================

---
# Deployment: Vegetation Prime Beat Scheduler
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vegetation-prime-beat
  namespace: nekazari
  labels:
    app: vegetation-prime-beat
    component: beat
    module: vegetation-prime
    nekazari.io/profile: addon
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vegetation-prime-beat
  template:
    metadata:
      labels:
        app: vegetation-prime-beat
        component: beat
        module: vegetation-prime
    spec:
      tolerations:
        - key: "node.kubernetes.io/disk-pressure"
          operator: "Exists"
          effect: "NoSchedule"
      containers:
        - name: beat
          image: ghcr.io/k8-benetis/vegetation-health-nkz/vegetation-prime-api:latest
          imagePullPolicy: Always
          command: ["celery", "-A", "app.celery_app", "beat", "--loglevel=info"]
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: postgresql-secret
                  key: postgres-url
            - name: PLATFORM_DATABASE_NAME
              value: "nekazari"
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: redis-secret
                  key: password
            - name: CELERY_BROKER_URL
              value: "redis://:$(REDIS_PASSWORD)@redis-service:6379/0"
            - name: CELERY_RESULT_BACKEND
              value: "redis://:$(REDIS_PASSWORD)@redis-service:6379/0"
            - name: REDIS_CACHE_URL
              value: "redis://:$(REDIS_PASSWORD)@redis-service:6379/1"
            - name: FIWARE_CONTEXT_BROKER_URL
              value: "http://orion-ld-service:1026"
            - name: S3_BUCKET
              value: "vegetation-prime-global"
            - name: VEGETATION_COG_BUCKET
              value: "vegetation-prime-global"
            - name: S3_ENDPOINT_URL
              value: "http://minio-service:9000"
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: minio-secret
                  key: root-user
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: minio-secret
                  key: root-password
            - name: COPERNICUS_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: vegetation-prime-secrets
                  key: copernicus-client-id
                  optional: true
            - name: COPERNICUS_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: vegetation-prime-secrets
                  key: copernicus-client-secret
                  optional: true
            - name: CDSE_S3_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: vegetation-prime-secrets
                  key: cdse-s3-access-key
                  optional: true
            - name: CDSE_S3_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: vegetation-prime-secrets
                  key: cdse-s3-secret-key
                  optional: true
            - name: LOG_LEVEL
              value: "INFO"
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          volumeMounts:
            - name: temp-storage
              mountPath: /app/storage
      volumes:
        - name: temp-storage
          emptyDir: {}
