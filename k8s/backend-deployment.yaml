# =============================================================================
# Vegetation Prime Backend Deployment
# =============================================================================
# FastAPI service for vegetation analysis jobs, indices, and configuration
# =============================================================================

---
# Deployment: Vegetation Prime API Service
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vegetation-prime-api
  namespace: nekazari
  labels:
    app: vegetation-prime-api
    component: backend
    module: vegetation-prime
    nekazari.io/profile: addon
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vegetation-prime-api
  template:
    metadata:
      labels:
        app: vegetation-prime-api
        component: backend
        module: vegetation-prime
    spec:
      tolerations:
        - key: "node.kubernetes.io/disk-pressure"
          operator: "Exists"
          effect: "NoSchedule"
      containers:
        - name: api
          image: ghcr.io/k8-benetis/vegetation-health-nkz/vegetation-prime-api:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: postgresql-secret
                  key: postgres-url
            - name: PLATFORM_DATABASE_NAME
              value: "nekazari"
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: redis-secret
                  key: password
            - name: CELERY_BROKER_URL
              value: "redis://:$(REDIS_PASSWORD)@redis-service:6379/0"
            - name: CELERY_RESULT_BACKEND
              value: "redis://:$(REDIS_PASSWORD)@redis-service:6379/0"
            - name: REDIS_CACHE_URL
              value: "redis://:$(REDIS_PASSWORD)@redis-service:6379/1"
            - name: JWT_ISSUER
              value: "https://auth.robotika.cloud/auth/realms/nekazari"
            - name: JWKS_URL
              value: "https://auth.robotika.cloud/auth/realms/nekazari/protocol/openid-connect/certs"
            - name: JWT_ALGORITHM
              value: "RS256"
            - name: FIWARE_CONTEXT_BROKER_URL
              value: "http://orion-ld-service:1026"
            - name: VEGETATION_COG_BUCKET
              value: "vegetation-prime-global"
            - name: S3_BUCKET
              value: "vegetation-prime-global"
            - name: TITILER_BASE_URL
              value: "https://nkz.robotika.cloud/titiler"
            - name: MODULE_MANAGEMENT_KEY
              valueFrom:
                secretKeyRef:
                  name: module-management-secret
                  key: key
                  optional: true
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: minio-secret
                  key: root-user
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: minio-secret
                  key: root-password
            - name: S3_ENDPOINT_URL
              value: "http://minio-service:9000"
            - name: COPERNICUS_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: vegetation-prime-secrets
                  key: copernicus-client-id
                  optional: true
            - name: COPERNICUS_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: vegetation-prime-secrets
                  key: copernicus-client-secret
                  optional: true
            - name: CDSE_S3_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: vegetation-prime-secrets
                  key: cdse-s3-access-key
                  optional: true
            - name: CDSE_S3_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: vegetation-prime-secrets
                  key: cdse-s3-secret-key
                  optional: true
            - name: DEFAULT_MONTHLY_HA_LIMIT
              value: "10.0"
            - name: DEFAULT_DAILY_HA_LIMIT
              value: "5.0"
            - name: DEFAULT_DAILY_JOBS_LIMIT
              value: "5"
            - name: DEFAULT_DAILY_DOWNLOAD_JOBS
              value: "3"
            - name: DEFAULT_DAILY_PROCESS_JOBS
              value: "10"
            - name: DEFAULT_DAILY_CALCULATE_JOBS
              value: "20"
            - name: LOG_LEVEL
              value: "INFO"
            - name: SQL_ECHO
              value: "false"
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "1Gi"
              cpu: "1"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3

---
# Service: Vegetation Prime API
apiVersion: v1
kind: Service
metadata:
  name: vegetation-prime-api-service
  namespace: nekazari
  labels:
    app: vegetation-prime-api
    component: backend
    module: vegetation-prime
spec:
  type: ClusterIP
  selector:
    app: vegetation-prime-api
  ports:
    - name: http
      port: 8000
      targetPort: 8000
      protocol: TCP
